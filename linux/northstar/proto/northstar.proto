syntax = "proto3";

package northstar;

import "google/protobuf/timestamp.proto";

option go_package = "bonfire/northstar/proto;northstar";

service Northstar {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ListHosts(Empty) returns (HostList);
  rpc AddHost(AddHostRequest) returns (Host);
  rpc UpdateHost(UpdateHostRequest) returns (Host);
  rpc DeleteHost(DeleteHostRequest) returns (Empty);
  rpc ListServices(Empty) returns (ServiceList);
  rpc AddService(AddServiceRequest) returns (Service);
  rpc UpdateService(UpdateServiceRequest) returns (Service);
  rpc DeleteService(DeleteServiceRequest) returns (Empty);
  rpc GetCredentials(CredentialRequest) returns (CredentialList);
  rpc ListInjects(Empty) returns (InjectList);
  rpc AddInject(AddInjectRequest) returns (Inject);
  rpc UpdateInject(UpdateInjectRequest) returns (Inject);
  rpc DeleteInject(DeleteInjectRequest) returns (Empty);
  rpc ListWebsites(Empty) returns (WebsiteList);
  rpc AddWebsite(AddWebsiteRequest) returns (Website);
  rpc UpdateWebsite(UpdateWebsiteRequest) returns (Website);
  rpc DeleteWebsite(DeleteWebsiteRequest) returns (Empty);
  rpc ListPasswords(Empty) returns (PasswordList);
  rpc SeedPasswords(Empty) returns (SeedPasswordsResponse);
  rpc UpdatePasswordComment(UpdatePasswordCommentRequest) returns (Empty);
  rpc ClearPasswords(Empty) returns (Empty);
  rpc ListFiles(Empty) returns (FileList);
  rpc UpdateFile(UpdateFileRequest) returns (File);
  rpc DeleteFile(DeleteFileRequest) returns (Empty);
  rpc AddHostPort(AddHostPortRequest) returns (HostPort);
  rpc DeleteHostPort(DeleteHostPortRequest) returns (Empty);
  rpc UpdateHostPort(UpdateHostPortRequest) returns (HostPort);
  rpc AddServicePort(AddServicePortRequest) returns (ServicePort);
  rpc DeleteServicePort(DeleteServicePortRequest) returns (Empty);
  rpc ImportHosts(ImportHostsRequest) returns (ImportHostsResponse);
  rpc ClearHosts(Empty) returns (Empty);
  rpc AddServiceDependency(AddServiceDependencyRequest) returns (Empty);
  rpc DeleteServiceDependency(DeleteServiceDependencyRequest) returns (Empty);
  rpc ListNetworks(Empty) returns (NetworkList);
  rpc AddNetwork(AddNetworkRequest) returns (Network);
  rpc UpdateNetwork(UpdateNetworkRequest) returns (Network);
  rpc DeleteNetwork(DeleteNetworkRequest) returns (Empty);
  rpc ListAllowedIPs(Empty) returns (AllowedIPList);
  rpc AddAllowedIP(AddAllowedIPRequest) returns (AllowedIP);
  rpc UpdateAllowedIP(UpdateAllowedIPRequest) returns (AllowedIP);
  rpc DeleteAllowedIP(DeleteAllowedIPRequest) returns (Empty);
}

message Empty {}

message ImportHostsRequest {
  string toml_content = 1;
}

message ImportHostsResponse {
  uint32 hosts_imported = 1;
  uint32 hosts_updated = 2;
  repeated string errors = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
}

message Host {
  uint32 id = 1;
  string hostname = 2;
  string ip = 3;
  string os_type = 4;
  string os_version = 5;
  string role = 6;
  optional int32 password_index = 7;
  bool firewall_enabled = 8;
  repeated HostPort host_ports = 9;
  repeated Service services = 10;
  optional uint32 network_id = 11;
}

message HostPort {
  uint32 host_id = 1;
  uint32 port = 2;
  bool whitelisted = 3;
}

message Service {
  uint32 id = 1;
  uint32 host_id = 2;
  string name = 3;
  string technology = 4;
  bool scored = 5;
  bool disabled = 6;
  bool backed_up = 7;
  bool hardened = 8;
  bool ldap_authentication = 9;
  repeated ServicePort service_ports = 10;
  repeated Website websites = 11;
  optional int32 password_index = 12;
  repeated ServiceDependency dependencies = 13;
}

message ServiceDependency {
  uint32 service_id = 1;
  uint32 depends_on_id = 2;
  string depends_on_name = 3;
  string depends_on_host = 4;
}

message AddServiceDependencyRequest {
  uint32 service_id = 1;
  uint32 depends_on_id = 2;
}

message DeleteServiceDependencyRequest {
  uint32 service_id = 1;
  uint32 depends_on_id = 2;
}

message ServicePort {
  uint32 service_id = 1;
  uint32 port = 2;
}

message Website {
  uint32 id = 1;
  uint32 service_id = 2;
  string name = 3;
  string url = 4;
  string username = 5;
  optional int32 password_index = 6;
  string old_password = 7;
  bool enumerated = 8;
}

message PasswordEntry {
  int32 index = 1;
  string category = 2;
  string comment = 3;
  repeated PasswordAssignment assignments = 4;
}

message PasswordAssignment {
  string type = 1;
  string label = 2;
  uint32 entity_id = 3;
}

message HostList {
  repeated Host hosts = 1;
}

message ServiceList {
  repeated Service services = 1;
}

message WebsiteList {
  repeated Website websites = 1;
}

message PasswordList {
  repeated PasswordEntry passwords = 1;
}

message AddHostRequest {
  optional string hostname = 1;
  string ip = 2;
  optional int32 password_index = 3;
  bool firewall_enabled = 4;
  repeated uint32 ports = 5;
  string os_type = 6;
  optional uint32 network_id = 7;
}

message AddServiceRequest {
  uint32 host_id = 1;
  string name = 2;
  string technology = 3;
  bool scored = 4;
  repeated uint32 ports = 5;
  optional int32 password_index = 6;
}

message AddWebsiteRequest {
  uint32 service_id = 1;
  string name = 2;
  string url = 3;
  string username = 4;
  optional int32 password_index = 5;
  string old_password = 6;
  bool enumerated = 7;
}

message UpdateHostRequest {
  uint32 id = 1;
  string hostname = 2;
  string ip = 3;
  string os_type = 4;
  string os_version = 5;
  string role = 6;
  optional int32 password_index = 7;
  bool firewall_enabled = 8;
  optional uint32 network_id = 9;
}

message UpdateServiceRequest {
  uint32 id = 1;
  string name = 2;
  string technology = 3;
  bool scored = 4;
  bool disabled = 5;
  bool backed_up = 6;
  bool hardened = 7;
  bool ldap_authentication = 8;
  optional uint32 host_id = 9;
  optional int32 password_index = 10;
}

message UpdateWebsiteRequest {
  uint32 id = 1;
  string name = 2;
  string url = 3;
  string username = 4;
  optional int32 password_index = 5;
  string old_password = 6;
  optional uint32 service_id = 7;
  bool enumerated = 8;
}

message CredentialRequest {
  // Optional filters
  uint32 host_id = 1;
  uint32 service_id = 2;
}

message Credential {
  uint32 id = 1;
  string type = 2; // "Host", "Website", "Password"
  string username = 3;
  string password = 4;
  string description = 5; // e.g. Hostname, Website URL, or Password Comment
  string category = 6; // For Password table entries
}

message CredentialList {
  repeated Credential credentials = 1;
}

message Inject {
  uint32 id = 1;
  string number = 2;
  google.protobuf.Timestamp due = 3;
  repeated Assignee assignees = 4;
  bool completed = 5;
  string title = 6;
  string description = 7;
  string content = 8;
  string submission_url = 9;
}

message Assignee {
  uint32 id = 1;
  string name = 2;
  uint32 inject_id = 3;
}

message InjectList {
  repeated Inject injects = 1;
}

message AddInjectRequest {
  string number = 1;
  google.protobuf.Timestamp due = 2;
  repeated string assignee_names = 3;
  string title = 4;
  string description = 5;
  string content = 6;
}

message UpdateInjectRequest {
  uint32 id = 1;
  string number = 2;
  google.protobuf.Timestamp due = 3;
  bool completed = 4;
  string title = 5;
  string description = 6;
  string content = 7;
  repeated string assignee_names = 8;
  string submission_url = 9;
}

message DeleteInjectRequest {
  uint32 id = 1;
}

message DeleteHostRequest {
  uint32 id = 1;
}

message DeleteServiceRequest {
  uint32 id = 1;
}

message DeleteWebsiteRequest {
  uint32 id = 1;
}

message SeedPasswordsResponse {
  int32 count = 1;
}

message UpdatePasswordCommentRequest {
  int32 index = 1;
  string comment = 2;
}

message UpdateHostPortRequest {
  uint32 host_id = 1;
  uint32 port = 2;
  bool whitelisted = 3;
}

message AddHostPortRequest {
  uint32 host_id = 1;
  uint32 port = 2;
  bool whitelisted = 3;
}

message DeleteHostPortRequest {
  uint32 host_id = 1;
  uint32 port = 2;
}

message AddServicePortRequest {
  uint32 service_id = 1;
  uint32 port = 2;
}

message DeleteServicePortRequest {
  uint32 service_id = 1;
  uint32 port = 2;
}

message File {
  uint32 id = 1;
  string name = 2;
  int64 size = 3;
  string url = 4;
  google.protobuf.Timestamp uploaded_at = 5;
  string description = 6;
}

message FileList {
  repeated File files = 1;
}

message UpdateFileRequest {
  uint32 id = 1;
  string name = 2;
  string description = 3;
}

message DeleteFileRequest {
  uint32 id = 1;
}

message Network {
  uint32 id = 1;
  string name = 2;
  string cidr = 3;
  string description = 4;
}

message NetworkList {
  repeated Network networks = 1;
}

message AddNetworkRequest {
  string name = 1;
  string cidr = 2;
  string description = 3;
}

message UpdateNetworkRequest {
  uint32 id = 1;
  string name = 2;
  string cidr = 3;
  string description = 4;
}

message DeleteNetworkRequest {
  uint32 id = 1;
}

message AllowedIP {
  uint32 id = 1;
  string cidr = 2;
  string description = 3;
}

message AllowedIPList {
  repeated AllowedIP allowed_ips = 1;
}

message AddAllowedIPRequest {
  string cidr = 1;
  string description = 2;
}

message UpdateAllowedIPRequest {
  uint32 id = 1;
  string cidr = 2;
  string description = 3;
}

message DeleteAllowedIPRequest {
  uint32 id = 1;
}
