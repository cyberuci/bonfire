version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: proto/
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: proto/
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es:v1.7.0
    out: ui/src/gen
    opt: target=ts
  - remote: buf.build/connectrpc/es
    out: ui/src/gen
    opt: target=ts
